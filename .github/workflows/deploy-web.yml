name: Deploy Web Preview (GitHub Pages)

# Baut Foreverly (Demo-Modus) und veröffentlicht nach gh-pages.
# Einzige Live-Quelle: main. Ergebnis-URL: https://lamorstudios.github.io/FOREVERLY/

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      EXPO_BASE_URL: '/FOREVERLY'
      EXPO_PUBLIC_INVITE_BASE_URL: 'https://lamorstudios.github.io/FOREVERLY/invite'
      # Web-Vorschau läuft im Demo-Modus (kein Auth-/Supabase-Gate).
      EXPO_PUBLIC_DEMO_MODE: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build-Stempel setzen (sichtbar im Footer)
        run: |
          echo "EXPO_PUBLIC_BUILD_ID=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "EXPO_PUBLIC_BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_ENV"

      - name: Build web bundle
        run: npx expo export --platform web

      - name: SPA-Fallback, No-Cache-HTML, SEO & Jekyll deaktivieren
        run: |
          touch dist/.nojekyll
          # No-Cache + SEO-Description im <head>.
          sed -i 's#<head>#<head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" /><meta http-equiv="Pragma" content="no-cache" /><meta http-equiv="Expires" content="0" /><meta name="description" content="Familienbaum, Erinnerungen, Zeitkapseln, Dokumente und Familiengeschichte an einem Ort." />#' dist/index.html
          # SEO-Titel.
          sed -i 's#<title>FAMII</title>#<title>FAMII – Eure Geschichte für Generationen</title>#' dist/index.html
          # Sichtbarer Start-Platzhalter (FAMII).
          sed -i 's|<div id="root"></div>|<div id="root"><div id="fv-fallback" style="font-family:sans-serif;padding:48px 24px;text-align:center;color:#6F6253">FAMII wird gestartet \&hellip;<br/><br/><span style="font-size:13px">App-Code wird geladen \&hellip;</span></div></div>|' dist/index.html
          # Bundle-Fehler-Handler (Selbstheilung bei 404/Netzwerk).
          sed -i 's#<script src="/FOREVERLY/_expo#<script>window.__fvErr=function(){var f=document.getElementById("fv-fallback");if(sessionStorage.getItem("fv_e")){if(f)f.innerHTML="App-Code konnte nicht geladen werden (Netzwerk/404).<br/>Bitte Seite neu laden oder Cache leeren.";return;}sessionStorage.setItem("fv_e","1");location.replace(location.pathname+"?v="+Date.now());};</script><script src="/FOREVERLY/_expo#' dist/index.html
          sed -i 's#\.js" defer></script>#.js" defer onerror="window.__fvErr()"></script>#' dist/index.html
          cp dist/index.html dist/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true
